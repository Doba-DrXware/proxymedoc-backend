spring.datasource.url=jdbc:postgresql://localhost:5432/proxymedoc
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=proxyadmin
spring.datasource.password=proxyadmin

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8080

# JWT Configuration
app.jwtSecret=ProxymedocBackendSecretKeyFor2024AndBeyond123456789
app.jwtExpirationMs=86400000

